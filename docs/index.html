<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1656A0">
<title>はちバス時刻表</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="vendor/leaflet.css">
<script src="vendor/leaflet.js" defer></script>
<style>
:root{
  --blue:#1656A0; --navy:#0E3A6E; --amber:#FFB100;
  --bg:#EEF1F4; --line:#DDE2E8; --ink:#1B2733; --sub:#66727F;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI","Noto Sans JP",sans-serif;
  background:var(--bg); color:var(--ink); font-size:15px; line-height:1.5;
}
.num{font-variant-numeric:tabular-nums}
#app{max-width:420px;margin:0 auto;min-height:100vh;background:var(--bg);
  padding-bottom:24px}

/* ヘッダー */
header{
  background:var(--blue); color:#fff; padding:14px 16px 12px;
  display:flex; justify-content:space-between; align-items:baseline;
  position:sticky; top:0; z-index:20;
}
header h1{font-size:17px;font-weight:700;letter-spacing:.02em}
header .today{font-size:13px;opacity:.95}
header .today .dia{
  display:inline-block;margin-left:6px;padding:1px 8px;border-radius:999px;
  background:rgba(255,255,255,.18);font-weight:600;font-size:12px;
}

/* 有効期限警告バー */
#expireBar{
  display:none;background:var(--amber);color:#4A3200;font-size:12.5px;
  padding:7px 16px;font-weight:600;
}

/* 定番ルートチップ */
#chips{
  display:flex;gap:8px;overflow-x:auto;padding:12px 16px 4px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
#chips::-webkit-scrollbar{display:none}
.chip{
  flex:0 0 auto;padding:7px 14px;border-radius:999px;font-size:13px;
  background:#fff;border:1px solid var(--line);color:var(--ink);
  white-space:nowrap;user-select:none;-webkit-user-select:none;cursor:pointer;
}
.chip.active{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:600}

/* 次便カード */
#nextWrap{padding:10px 16px 0}
#nextCard{
  background:linear-gradient(135deg,var(--blue) 0%,var(--navy) 100%);
  border-radius:16px;color:#fff;padding:16px 18px 14px;
  box-shadow:0 4px 14px rgba(14,58,110,.25);
}
#nextCard .route{font-size:13px;opacity:.92;margin-bottom:2px}
#nextCard .main{display:flex;align-items:center;gap:14px}
#nextCard .count{display:flex;align-items:baseline;color:#fff}
#nextCard .count .n{font-size:52px;font-weight:800;line-height:1.05;letter-spacing:-.02em}
#nextCard .count .u{font-size:14px;font-weight:600;margin-left:3px;opacity:.9}
#nextCard .count .pre{font-size:13px;margin-right:4px;opacity:.9}
#nextCard .detail{flex:1;min-width:0}
#nextCard .times{font-size:16px;font-weight:700}
#nextCard .times .arrow{opacity:.7;font-weight:400;margin:0 3px}
#nextCard .meta{font-size:12.5px;opacity:.88;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#nextCard.empty{padding:20px 18px;text-align:center;font-size:13.5px;opacity:.95}
.badge{
  display:inline-block;background:var(--amber);color:#4A3200;font-weight:800;
  font-size:12px;border-radius:6px;padding:1px 7px;vertical-align:1px;
}
#nextCard .badge{margin-right:6px}

/* 後続便 */
#after{display:flex;gap:8px;padding:8px 16px 0}
.afterCard{
  flex:1;background:#fff;border:1px solid var(--line);border-radius:12px;
  padding:8px 12px;font-size:12.5px;color:var(--sub);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;
}
.afterCard b{color:var(--ink);font-size:15px;font-weight:700}

/* セクション */
section.card{
  background:#fff;border:1px solid var(--line);border-radius:16px;
  margin:14px 16px 0;padding:14px 16px;
}
section.card h2{font-size:13px;color:var(--sub);font-weight:700;margin-bottom:10px;letter-spacing:.04em}

/* 検索フォーム */
.stopRow{display:flex;align-items:center;gap:8px;position:relative}
.stopFields{flex:1;display:flex;flex-direction:column;gap:8px;min-width:0}
.field{position:relative;display:flex;align-items:center;gap:8px}
.field input{
  flex:1;min-width:0;border:1px solid var(--line);border-radius:10px;
  padding:10px 12px 10px 34px;font-size:15px;background:#FAFBFC;color:var(--ink);
}
.locbtn{
  flex:none;display:flex;align-items:center;gap:5px;
  border:1.5px solid var(--blue);color:var(--blue);
  background:#fff;border-radius:999px;
  font-size:12px;font-weight:700;
  padding:6px 11px;cursor:pointer;
  transition:background .15s;
}
.locbtn:active{background:#E3F0FD}
.locbtn svg{width:13px;height:13px;fill:var(--blue)}
.field input:focus{outline:none;border-color:var(--blue);background:#fff}
.field .mark{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  width:10px;height:10px;border-radius:50%;
}
.field.from .mark{background:var(--blue)}
.field.to .mark{background:var(--amber)}
#swapBtn{
  flex:0 0 auto;width:38px;height:38px;border-radius:50%;border:1px solid var(--line);
  background:#fff;color:var(--blue);font-size:17px;cursor:pointer;
}
#swapBtn:active{background:var(--bg)}
.suggest{
  position:absolute;left:0;right:0;top:calc(100% + 4px);z-index:30;
  background:#fff;border:1px solid var(--line);border-radius:10px;
  box-shadow:0 6px 18px rgba(27,39,51,.15);max-height:240px;overflow-y:auto;display:none;
}
.suggest div{padding:9px 12px;border-bottom:1px solid var(--line);font-size:14px;cursor:pointer}
.suggest div:last-child{border-bottom:none}
.suggest div:active{background:var(--bg)}

/* 下線タブ */
.tabs{display:flex;border-bottom:2px solid var(--line);margin-top:14px}
.tabs button{
  flex:1;background:none;border:none;padding:8px 0 7px;font-size:13.5px;color:var(--sub);
  cursor:pointer;position:relative;font-weight:600;
}
.tabs button.active{color:var(--blue)}
.tabs button.active::after{
  content:"";position:absolute;left:0;right:0;bottom:-2px;height:2px;background:var(--blue);
}
#timeInputWrap{margin-top:10px}
#timeInput{
  width:100%;border:1px solid var(--line);border-radius:10px;padding:9px 12px;
  font-size:16px;background:#FAFBFC;color:var(--ink);
}
#timeInput:disabled{opacity:.45}

/* 検索結果 */
#caption{font-size:12.5px;color:var(--sub);margin:14px 16px 0;font-weight:600}
#results{
  background:#fff;border:1px solid var(--line);border-radius:16px;
  margin:6px 16px 0;overflow:hidden;
}
.row{
  display:flex;align-items:center;gap:10px;padding:11px 12px 11px 14px;
  border-bottom:1px solid var(--line);position:relative;
}
.row:last-child{border-bottom:none}
.row.soon{background:#EDF4FC}
.row.soon::before{
  content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--blue);
}
.row .badge{flex:0 0 auto;min-width:34px;text-align:center}
.row .body{flex:1;min-width:0}
.row .t{font-size:16.5px;font-weight:700}
.row .t .arrow{color:var(--sub);font-weight:400;margin:0 2px;font-size:13px}
.row .t .dur{font-size:12px;color:var(--sub);font-weight:600;margin-left:7px}
.row .sub{font-size:12px;color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .star{
  flex:0 0 auto;background:none;border:none;font-size:21px;color:#C6CDD4;
  cursor:pointer;padding:4px 2px;line-height:1;
}
.row .star.on{color:var(--amber)}
.empty-msg{padding:22px 16px;text-align:center;color:var(--sub);font-size:13.5px}

/* フッター */
footer{margin:22px 16px 0;font-size:11.5px;color:var(--sub);text-align:center;line-height:1.7}

/* ===== 目的地から（ボトムシート） mock-location-v4 準拠 ===== */
:root{--dest-red:#E0503A}
.overlay{
  position:fixed;inset:0;background:rgba(16,32,54,.42);
  opacity:0;pointer-events:none;transition:opacity .22s;z-index:40;
}
.overlay.show{opacity:1;pointer-events:auto}
.sheet{
  position:fixed;left:50%;top:0;z-index:41;
  width:100%;max-width:420px;
  max-height:92vh;overflow-y:auto;
  background:#fff;border-radius:0 0 20px 20px;
  padding:16px 16px 16px;
  transform:translate(-50%,-105%);transition:transform .28s cubic-bezier(.32,.72,.2,1);
  box-shadow:0 6px 30px rgba(14,58,110,.2);
}
.sheet.show{transform:translate(-50%,0)}
.sheethead{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sheet h2{
  font-size:15px;font-weight:800;color:var(--ink);
  display:flex;align-items:center;gap:7px;
}
.sheet h2 svg{width:16px;height:16px;fill:var(--blue)}
.viewtoggle{display:none;flex:none;background:#EDF2F7;border-radius:999px;padding:3px}
.viewtoggle.show{display:flex}
.viewtoggle button{
  border:none;background:none;color:var(--sub);
  font-size:12px;font-weight:700;
  padding:5px 14px;border-radius:999px;cursor:pointer;
  transition:all .15s;
}
.viewtoggle button.active{background:var(--blue);color:#fff}
/* 施設検索ボックス */
.placesearch{position:relative;margin-bottom:8px}
.psrow{
  display:flex;align-items:center;gap:8px;
  border:1.5px solid var(--line);border-radius:12px;
  padding:9px 12px;background:#FAFCFE;
}
.psrow:focus-within{border-color:var(--blue)}
.psrow svg{flex:none;width:15px;height:15px;fill:#8A97A5}
.psrow input{
  flex:1;border:none;outline:none;background:transparent;
  font-size:14px;color:var(--ink);min-width:0;padding:0;
}
.psrow input::placeholder{color:#A6B2BF}
.psrow .clear{
  flex:none;display:none;border:none;background:#DDE5EC;color:var(--sub);
  width:20px;height:20px;border-radius:50%;font-size:11px;cursor:pointer;line-height:1;
}
.psrow .clear.show{display:block}
.pssuggest{
  position:absolute;left:0;right:0;top:calc(100% + 4px);z-index:5;
  background:#fff;border:1px solid var(--line);border-radius:12px;
  box-shadow:0 6px 20px rgba(14,58,110,.14);
  overflow:hidden;display:none;
}
.pssuggest.show{display:block}
.sugrow{
  display:flex;align-items:center;gap:10px;
  padding:11px 13px;cursor:pointer;font-size:14px;
  border-bottom:1px solid #F0F4F8;
}
.sugrow:last-child{border-bottom:none}
.sugrow:active{background:#F4F8FC}
.sugrow svg{flex:none;width:14px;height:14px;fill:var(--dest-red)}
.sugrow span:first-of-type{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sugrow .kind{margin-left:auto;flex:none;font-size:10.5px;color:var(--sub)}
.noresult{padding:12px 13px;font-size:12.5px;color:var(--sub)}
.sheetnote{font-size:11.5px;color:var(--sub);margin-bottom:8px;min-height:16px}
.sheetnote b{color:var(--dest-red);font-weight:800}
/* 位置情報の取得中・エラー */
.locloading{display:none;padding:30px 0 26px;text-align:center}
.locloading.show{display:block}
.radar{
  width:44px;height:44px;margin:0 auto 12px;border-radius:50%;
  border:3px solid #E3F0FD;border-top-color:var(--blue);
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.locloading p{font-size:13px;color:var(--sub)}
.locerror{display:none;padding:22px 6px 8px;text-align:center}
.locerror.show{display:block}
.locerror .icon{font-size:30px;margin-bottom:8px}
.locerror h3{font-size:14.5px;font-weight:800;margin-bottom:6px}
.locerror p{font-size:12.5px;color:var(--sub);line-height:1.65;margin-bottom:6px}
/* 近いバス停リスト */
.stoplist{display:none}
.stoplist.show{display:block}
.stoprow{
  display:flex;align-items:center;gap:12px;
  padding:11px 2px;border-bottom:1px solid var(--line);cursor:pointer;
}
.stoprow:last-child{border-bottom:none}
.stoprow:active{background:#F4F8FC}
.stoprow .pin{
  flex:none;width:34px;height:34px;border-radius:50%;
  background:#E3F0FD;display:flex;align-items:center;justify-content:center;
}
.stoprow .pin svg{width:15px;height:15px;fill:var(--blue)}
.stoprow:first-of-type .pin{background:var(--amber)}
.stoprow:first-of-type .pin svg{fill:#fff}
.stoprow .info{flex:1;min-width:0}
.stoprow .name{font-size:15px;font-weight:700}
.stoprow .plat{font-size:11px;color:var(--sub);margin-top:2px}
.stoprow .dist{flex:none;text-align:right}
.stoprow .dist .m{font-size:14px;font-weight:800;color:var(--navy)}
.stoprow .dist .walk{font-size:10.5px;color:var(--sub);margin-top:2px}
/* 地図ビュー（Leaflet） */
.mapview{display:none}
.mapview.show{display:block}
.mapbox{
  border-radius:14px;overflow:hidden;
  border:1px solid var(--line);position:relative;
}
#locMap{width:100%;height:260px;background:#E9E6DD}
.maphint{
  position:absolute;top:8px;left:8px;z-index:900;
  background:rgba(255,255,255,.92);border-radius:8px;
  font-size:10.5px;color:var(--sub);font-weight:600;
  padding:5px 9px;pointer-events:none;
}
.mapctrl{
  position:absolute;right:8px;bottom:8px;z-index:900;
  display:flex;flex-direction:column;gap:6px;
}
.mapctrl button{
  width:34px;height:34px;border-radius:10px;
  border:1px solid var(--line);background:rgba(255,255,255,.95);
  color:var(--ink);font-size:17px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 1px 4px rgba(14,58,110,.12);
}
.mapctrl button:active{background:#E3F0FD}
.mapctrl button svg{width:17px;height:17px;fill:var(--blue)}
/* Leaflet 上のピン（divIcon） */
.mpin{display:flex;flex-direction:column;align-items:center;width:max-content;
  transform:translate(-50%,-13px);cursor:pointer}
.mpin .mdot{
  width:20px;height:20px;border-radius:50%;background:var(--blue);
  border:3px solid #fff;color:#fff;font-size:10px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 1px 4px rgba(0,0,0,.35);transition:background .15s;
}
.mpin.closest .mdot,.mpin.selected .mdot{background:var(--amber)}
.mpin .mlabel{
  font-size:10px;font-weight:700;color:#37474F;white-space:nowrap;margin-top:2px;
  text-shadow:1px 0 0 #fff,-1px 0 0 #fff,0 1px 0 #fff,0 -1px 0 #fff,
    1px 1px 0 #fff,-1px -1px 0 #fff,1px -1px 0 #fff,-1px 1px 0 #fff;
}
/* 現在地（青いパルスドット） */
.mepin{position:relative;transform:translate(-50%,-50%);width:14px;height:14px}
.mepin .dot{
  width:14px;height:14px;border-radius:50%;background:var(--blue);
  border:2.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.35);
}
.mepin .pulse{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:14px;height:14px;border-radius:50%;border:2px solid var(--blue);
  animation:mepulse 2s ease-out infinite;
}
@keyframes mepulse{
  0%{width:14px;height:14px;opacity:.55}
  70%{width:46px;height:46px;opacity:0}
  100%{width:46px;height:46px;opacity:0}
}
.dpin{position:relative;transform:translate(-50%,-100%);width:max-content}
.dpin svg{display:block}
.dpin .dlabel{
  position:absolute;top:100%;left:50%;transform:translateX(-50%);
  font-size:10px;font-weight:800;color:var(--dest-red);white-space:nowrap;
  text-shadow:1px 0 0 #fff,-1px 0 0 #fff,0 1px 0 #fff,0 -1px 0 #fff,
    1px 1px 0 #fff,-1px -1px 0 #fff,1px -1px 0 #fff,-1px 1px 0 #fff;
}
/* 選択バー */
.selectbar{
  display:none;align-items:center;gap:10px;
  margin-top:10px;padding:10px 12px;
  background:#F4F8FC;border:1px solid #CFE3F7;border-radius:12px;
}
.selectbar.show{display:flex}
.selectbar .sinfo{flex:1;min-width:0}
.selectbar .sname{font-size:14.5px;font-weight:800}
.selectbar .sdist{font-size:11px;color:var(--sub);margin-top:1px}
.selectbar button{
  flex:none;border:none;background:var(--blue);color:#fff;
  font-size:13px;font-weight:700;border-radius:999px;
  padding:9px 18px;cursor:pointer;
}
.selectbar button:active{background:var(--navy)}
/* トースト */
.toast{
  position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(16px);
  background:#26313D;color:#fff;font-size:12.5px;font-weight:600;
  padding:10px 18px;border-radius:999px;white-space:nowrap;
  opacity:0;pointer-events:none;transition:all .25s;z-index:60;
  max-width:92%;overflow:hidden;text-overflow:ellipsis;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media (prefers-reduced-motion: reduce){
  *{transition:none !important;animation:none !important}
}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>はちバス時刻表</h1>
    <div class="today num" id="todayLabel"></div>
  </header>
  <div id="expireBar"></div>

  <div id="chips"></div>

  <div id="nextWrap">
    <div id="nextCard" class="empty">読み込み中…</div>
  </div>
  <div id="after"></div>

  <section class="card">
    <h2>バス停をさがす</h2>
    <div class="stopRow">
      <div class="stopFields">
        <div class="field from">
          <span class="mark"></span>
          <input id="fromInput" type="text" placeholder="乗車バス停" autocomplete="off" enterkeyhint="search">
          <button class="locbtn" id="fromLocBtn" type="button">
            <svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 0-7 7c0 5.2 7 13 7 13s7-7.8 7-13a7 7 0 0 0-7-7zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5z"/></svg>
            現在地から
          </button>
          <div class="suggest" id="fromSuggest"></div>
        </div>
        <div class="field to">
          <span class="mark"></span>
          <input id="toInput" type="text" placeholder="降車バス停" autocomplete="off" enterkeyhint="search">
          <button class="locbtn" id="destBtn" type="button">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/></svg>
            目的地から
          </button>
          <div class="suggest" id="toSuggest"></div>
        </div>
      </div>
      <button id="swapBtn" title="乗車と降車を入れ替え">⇅</button>
    </div>

    <div class="tabs" id="modeTabs">
      <button data-mode="now" class="active">今から</button>
      <button data-mode="dep">出発</button>
      <button data-mode="arr">到着</button>
    </div>
    <div id="timeInputWrap">
      <input id="timeInput" type="time" disabled>
    </div>

    <div class="tabs" id="diaTabs">
      <button data-dia="0">平日</button>
      <button data-dia="1">土曜</button>
      <button data-dia="2">日祝</button>
    </div>
  </section>

  <div id="caption"></div>
  <div id="results"><div class="empty-msg">乗車・降車バス停を選ぶと便を表示します</div></div>

  <footer>
    出典: 八戸市交通部 GTFS-JPオープンデータ（CC BY 4.0）<br>
    <span id="expireLabel" class="num"></span>
  </footer>

  <!-- 目的地から: ボトムシート -->
  <div class="overlay" id="locOverlay"></div>
  <div class="sheet" id="locSheet">
    <div class="sheethead">
      <h2>
        <svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 0-7 7c0 5.2 7 13 7 13s7-7.8 7-13a7 7 0 0 0-7-7zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5z"/></svg>
        <span id="locTitle">目的地の近くのバス停</span>
      </h2>
      <div class="viewtoggle" id="viewToggle">
        <button class="active" data-view="list" type="button">リスト</button>
        <button data-view="map" type="button">地図</button>
      </div>
    </div>

    <div class="placesearch">
      <div class="psrow">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/></svg>
        <input id="psInput" type="text" placeholder="施設名で検索（例：はっち・市庁）" autocomplete="off">
        <button class="clear" id="psClear" type="button">✕</button>
      </div>
      <div class="pssuggest" id="psSuggest"></div>
    </div>

    <p class="sheetnote" id="sheetNote"></p>

    <div class="locloading" id="locLoading">
      <div class="radar"></div>
      <p>位置情報を取得中…</p>
    </div>

    <div class="locerror" id="locError">
      <div class="icon">📍</div>
      <h3>位置情報を利用できません</h3>
      <p>ブラウザの設定で位置情報が許可されていません。<br>iPhoneの場合：設定 → Safari → 位置情報 から<br>「確認」または「許可」を選んでください。<br>上の検索欄から施設名で探すこともできます。</p>
    </div>

    <div class="stoplist" id="stoplist"></div>

    <div class="mapview" id="mapview">
      <div class="mapbox">
        <div id="locMap"></div>
        <div class="maphint">ドラッグで移動・ピンチで拡大</div>
        <div class="mapctrl">
          <button id="zoomIn" title="拡大" type="button">＋</button>
          <button id="zoomOut" title="縮小" type="button">−</button>
          <button id="recenter" title="目的地に戻る" type="button">
            <svg viewBox="0 0 24 24"><path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8zm9 3h-1.07A8 8 0 0 0 13 4.07V3h-2v1.07A8 8 0 0 0 4.07 11H3v2h1.07A8 8 0 0 0 11 19.93V21h2v-1.07A8 8 0 0 0 19.93 13H21v-2zm-9 7a6 6 0 1 1 0-12 6 6 0 0 1 0 12z"/></svg>
          </button>
        </div>
      </div>
      <div class="selectbar" id="selectbar">
        <div class="sinfo">
          <div class="sname" id="selName">—</div>
          <div class="sdist" id="selDist">—</div>
        </div>
        <button id="selConfirm" type="button">降車に設定</button>
      </div>
    </div>
  </div>
  <div class="toast" id="locToast"></div>
</div>

<script>
"use strict";
// ===== 定数・状態 =====
const DIA_NAMES = ["平日", "土曜", "日祝"];
const LS_FAVS = "hachibus.favs";     // [{f:乗車グループ名, t:降車グループ名}]
const LS_STATE = "hachibus.state";   // {sel, from, to, mode, dia, time}
let DATA = null;
let groupByName = new Map();   // グループ名 → グループidx
let stopsOfGroup = [];         // グループidx → [停留所int id]
let searchIndex = [];          // [{gi, norm, kana}]
let favs = [];
let state = { sel: 0, from: "", to: "", mode: "now", dia: 0, time: "" };
let timer = null;

const $ = s => document.querySelector(s);

// ===== ユーティリティ =====
// カタカナ→ひらがな + NFKC正規化（かな⇄カナどちらでも検索できるように）
function norm(s) {
  return s.normalize("NFKC").toLowerCase().trim()
    .replace(/[ァ-ヶ]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60));
}
function fmtMin(m) {
  const mm = m % 1440; // 24時超え表記は当日深夜便として時刻表示
  const h = Math.floor(m / 60), mi = m % 60;
  return (m >= 1440 ? h : Math.floor(mm / 60)) + ":" + String(mi).padStart(2, "0");
}
function ymd(d) {
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate() + "";
}
function nowMin() { const n = new Date(); return n.getHours() * 60 + n.getMinutes(); }
// 今日のダイヤ区分（calendar_dates の例外日を優先）
function diaOfToday() {
  const d = new Date();
  const ex = DATA.hd[ymd(d)];
  if (ex !== undefined) return ex;
  const w = d.getDay();
  return w === 0 ? 2 : w === 6 ? 1 : 0;
}
function stopLabel(si) {
  const [gi, plat] = DATA.s[si];
  return DATA.g[gi][0] + (plat ? "（" + plat + "番のりば）" : "");
}
function saveState() { localStorage.setItem(LS_STATE, JSON.stringify(state)); }
function saveFavs() { localStorage.setItem(LS_FAVS, JSON.stringify(favs)); }

// ===== 検索ロジック =====
// 乗車・降車グループを「その順序で」通る便を抽出（stop_sequence 順のデータを走査）
function findTrips(fromGi, toGi, dia) {
  const fa = new Set(stopsOfGroup[fromGi]), ta = new Set(stopsOfGroup[toGi]);
  const out = [];
  for (const [cls, bi, hi, flat] of DATA.t) {
    if (cls !== dia) continue;
    let bK = -1, bDep = 0, bSi = -1;
    for (let k = 0; k < flat.length; k += 3) {
      const si = flat[k], dep = flat[k + 1], dd = flat[k + 2];
      if (bK < 0) {
        if (fa.has(si)) { bK = k; bDep = dep; bSi = si; }
      } else if (ta.has(si)) {
        out.push({ dep: bDep, arr: dep - dd, badge: DATA.b[bi], head: DATA.h[hi], fs: bSi, ts: si });
        break;
      }
    }
  }
  return out;
}

// ===== バス停サジェスト =====
function buildIndex() {
  DATA.g.forEach((g, gi) => {
    groupByName.set(g[0], gi);
    searchIndex.push({ gi, norm: norm(g[0]), kana: g[1] });
  });
  stopsOfGroup = DATA.g.map(() => []);
  DATA.s.forEach((s, si) => stopsOfGroup[s[0]].push(si));
}
function attachSuggest(inputId, boxId, key) {
  const input = $(inputId), box = $(boxId);
  // タップ（フォーカス）したら前回の入力を消して、すぐ打ち直せるようにする
  input.addEventListener("focus", () => {
    if (input.value) {
      input.value = "";
      state[key] = "";
      saveState();
      renderResults();
    }
  });
  input.addEventListener("input", () => {
    state[key] = ""; // 名前が確定するまで未選択扱い
    const q = norm(input.value);
    if (!q) { box.style.display = "none"; render(); return; }
    const hits = searchIndex.filter(e => e.norm.includes(q) || e.kana.includes(q)).slice(0, 8);
    box.innerHTML = "";
    hits.forEach(e => {
      const div = document.createElement("div");
      div.textContent = DATA.g[e.gi][0];
      div.addEventListener("pointerdown", ev => {
        ev.preventDefault();
        input.value = DATA.g[e.gi][0];
        state[key] = DATA.g[e.gi][0];
        box.style.display = "none";
        saveState(); render();
      });
      box.appendChild(div);
    });
    // 完全一致1件ならそのまま確定
    if (hits.length === 1 && DATA.g[hits[0].gi][0] === input.value) {
      state[key] = input.value; saveState();
    }
    box.style.display = hits.length ? "block" : "none";
  });
  input.addEventListener("blur", () => {
    setTimeout(() => { box.style.display = "none"; }, 150);
    if (groupByName.has(input.value)) { state[key] = input.value; saveState(); render(); }
  });
}

// ===== 定番ルート =====
function favLabel(f) {
  const short = n => n.replace(/（.+?）$/, "");
  return short(f.f) + " → " + short(f.t);
}
// 往復ペアが登録済みなら午前=先に登録した方向 / 午後=その逆 を初期表示
function autoSelectFav() {
  for (let i = 0; i < favs.length; i++) {
    for (let j = i + 1; j < favs.length; j++) {
      if (favs[i].f === favs[j].t && favs[i].t === favs[j].f) {
        return nowMin() < 720 ? i : j;
      }
    }
  }
  return Math.min(state.sel, favs.length - 1);
}
function renderChips() {
  const wrap = $("#chips");
  wrap.innerHTML = "";
  favs.forEach((f, i) => {
    const c = document.createElement("div");
    c.className = "chip" + (i === state.sel ? " active" : "");
    c.textContent = favLabel(f);
    c.addEventListener("click", () => { state.sel = i; saveState(); render(); });
    // 長押しで削除（確認ダイアログあり）
    let pressTimer = null;
    c.addEventListener("pointerdown", () => {
      pressTimer = setTimeout(() => {
        if (confirm("「" + favLabel(f) + "」を定番ルートから削除しますか？")) {
          favs.splice(i, 1);
          if (state.sel >= favs.length) state.sel = 0;
          saveFavs(); saveState(); render();
        }
      }, 600);
    });
    ["pointerup", "pointerleave", "pointercancel"].forEach(ev =>
      c.addEventListener(ev, () => clearTimeout(pressTimer)));
    c.addEventListener("contextmenu", e => e.preventDefault());
    wrap.appendChild(c);
  });
  wrap.style.display = favs.length ? "flex" : "none";
}
function isFav(f, t) { return favs.some(x => x.f === f && x.t === t); }
function toggleFav(f, t) {
  const i = favs.findIndex(x => x.f === f && x.t === t);
  if (i >= 0) favs.splice(i, 1); else favs.push({ f, t });
  if (state.sel >= favs.length) state.sel = Math.max(0, favs.length - 1);
  saveFavs(); render();
}

// ===== 次便カード =====
function renderNext() {
  const card = $("#nextCard"), after = $("#after");
  after.innerHTML = "";
  if (!favs.length) {
    card.className = "empty";
    card.innerHTML = "検索結果の <span style='color:var(--amber)'>★</span> をタップすると、定番ルートの次のバスをここに表示します";
    return;
  }
  const f = favs[state.sel] || favs[0];
  const fgi = groupByName.get(f.f), tgi = groupByName.get(f.t);
  if (fgi === undefined || tgi === undefined) {
    card.className = "empty";
    card.textContent = "定番ルートのバス停が現在のデータに見つかりません（ダイヤ改正の可能性）";
    return;
  }
  const now = nowMin();
  const trips = findTrips(fgi, tgi, diaOfToday())
    .filter(t => t.dep >= now).sort((a, b) => a.dep - b.dep);
  card.className = "";
  if (!trips.length) {
    card.className = "empty";
    card.textContent = favLabel(f) + " ： 本日の便は終了しました";
    return;
  }
  const n = trips[0];
  const rem = n.dep - now;
  card.innerHTML =
    '<div class="route">' + esc(favLabel(f)) + "</div>" +
    '<div class="main">' +
      '<div class="count num">' +
        (rem === 0 ? '<span class="pre">まもなく</span><span class="n">発車</span>'
                   : '<span class="pre">あと</span><span class="n">' + rem + '</span><span class="u">分</span>') +
      "</div>" +
      '<div class="detail">' +
        '<div>' + (n.badge ? '<span class="badge">' + esc(n.badge) + "</span>" : "") +
          '<span class="times num">' + fmtMin(n.dep) + '<span class="arrow">→</span>' + fmtMin(n.arr) + "</span></div>" +
        '<div class="meta num">所要' + (n.arr - n.dep) + "分・" + esc(n.head) + "行</div>" +
        (DATA.s[n.fs][1] ? '<div class="meta">' + esc(DATA.s[n.fs][1]) + "番のりば</div>" : "") +
      "</div>" +
    "</div>";
  trips.slice(1, 3).forEach(t => {
    const d = document.createElement("div");
    d.className = "afterCard num";
    d.innerHTML = "<b>" + fmtMin(t.dep) + "</b> 発（あと" + (t.dep - now) + "分）" +
      (t.badge ? "・" + esc(t.badge) : "");
    after.appendChild(d);
  });
}

// ===== 検索結果 =====
function renderResults() {
  const box = $("#results"), cap = $("#caption");
  const fgi = groupByName.get(state.from), tgi = groupByName.get(state.to);
  if (fgi === undefined || tgi === undefined) {
    cap.textContent = "";
    box.innerHTML = '<div class="empty-msg">乗車・降車バス停を選ぶと便を表示します</div>';
    return;
  }
  let trips = findTrips(fgi, tgi, state.dia);
  const [th, tm] = (state.time || "00:00").split(":").map(Number);
  const tMin = th * 60 + tm;
  const now = nowMin();
  let capText;
  if (state.mode === "now") {
    trips = trips.filter(t => t.dep >= now).sort((a, b) => a.dep - b.dep);
    capText = "今から乗れる便";
  } else if (state.mode === "dep") {
    trips = trips.filter(t => t.dep >= tMin).sort((a, b) => a.dep - b.dep);
    capText = fmtMin(tMin) + " 以降に出発する便";
  } else {
    trips = trips.filter(t => t.arr <= tMin).sort((a, b) => b.arr - a.arr);
    capText = fmtMin(tMin) + " までに到着する便";
  }
  cap.textContent = capText + "（" + DIA_NAMES[state.dia] + "ダイヤ・" + trips.length + "便）";
  if (!trips.length) {
    box.innerHTML = '<div class="empty-msg">条件に合う便がありません</div>';
    return;
  }
  box.innerHTML = "";
  trips.slice(0, 40).forEach((t, i) => {
    const row = document.createElement("div");
    row.className = "row" + (state.mode === "now" && i === 0 ? " soon" : "");
    const plat = DATA.s[t.fs][1];
    row.innerHTML =
      (t.badge ? '<span class="badge">' + esc(t.badge) + "</span>" : '<span class="badge" style="visibility:hidden">－</span>') +
      '<div class="body">' +
        '<div class="t num">' + fmtMin(t.dep) + '<span class="arrow">→</span>' + fmtMin(t.arr) +
          '<span class="dur">' + (t.arr - t.dep) + "分</span></div>" +
        '<div class="sub">' + esc(t.head) + "行" + (plat ? "・" + esc(plat) + "番のりば" : "") + "</div>" +
      "</div>";
    const star = document.createElement("button");
    star.className = "star" + (isFav(state.from, state.to) ? " on" : "");
    star.textContent = "★";
    star.title = "定番ルートに登録";
    star.addEventListener("click", () => toggleFav(state.from, state.to));
    row.appendChild(star);
    box.appendChild(row);
  });
  if (trips.length > 40) {
    const more = document.createElement("div");
    more.className = "empty-msg";
    more.textContent = "ほか " + (trips.length - 40) + " 便";
    box.appendChild(more);
  }
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

// ===== 目的地から（施設検索 → 近いバス停） =====
const PS_DEBOUNCE = 500;       // Nominatimは1秒1リクエスト制限のためデバウンス
const psCache = new Map();     // 検索語 → 結果（同じ語の再リクエストを避ける）
let psTimer = null, psAbort = null, psViewbox = null;
let targetField = "to";        // 'from'（乗車） | 'to'（降車）
let refPoint = null;           // 基準点 {label, lat, lon, isMe}（施設 or 現在地）
let lastGeo = null;            // 直近の現在地（施設検索クリア時に戻す）
let nearStops = [];            // [{gi, si, d}] 近い順5件
let selStop = null;
let locMap = null, stopMarkers = [], refMarker = null;
let locView = "list", locToastTimer = null;
function fieldLabel() { return targetField === "from" ? "乗車" : "降車"; }
function refLabel() { return refPoint.isMe ? "現在地" : "「" + refPoint.label + "」"; }

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000, rad = Math.PI / 180;
  const dLat = (lat2 - lat1) * rad, dLon = (lon2 - lon1) * rad;
  const a = Math.sin(dLat / 2) ** 2 +
    Math.cos(lat1 * rad) * Math.cos(lat2 * rad) * Math.sin(dLon / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(a));
}
function walkMin(m) { return Math.max(1, Math.ceil(m / 80)); }
function distLabel(m) { return "約" + Math.max(10, Math.round(m / 10) * 10) + "m"; }

// 八戸市域のviewbox（全停留所の範囲＋余白）を lon1,lat1,lon2,lat2 で返す
function hachiViewbox() {
  if (psViewbox) return psViewbox;
  let minLat = 90, maxLat = -90, minLon = 180, maxLon = -180;
  for (const s of DATA.s) {
    if (!s[2]) continue;
    minLat = Math.min(minLat, s[2]); maxLat = Math.max(maxLat, s[2]);
    minLon = Math.min(minLon, s[3]); maxLon = Math.max(maxLon, s[3]);
  }
  const m = 0.03;
  psViewbox = (minLon - m) + "," + (maxLat + m) + "," + (maxLon + m) + "," + (minLat - m);
  return psViewbox;
}

async function searchPlaces(q) {
  if (psCache.has(q)) return psCache.get(q);
  if (psAbort) psAbort.abort();
  psAbort = new AbortController();
  const url = "https://nominatim.openstreetmap.org/search?format=json&limit=8&accept-language=ja" +
    "&bounded=1&viewbox=" + hachiViewbox() + "&q=" + encodeURIComponent(q);
  const res = await fetch(url, { signal: psAbort.signal });
  if (!res.ok) throw new Error("HTTP " + res.status);
  const list = await res.json();
  psCache.set(q, list);
  return list;
}

function nearestGroups(lat, lon, n) {
  const best = new Map(); // グループidx → 最寄りのりば
  DATA.s.forEach((s, si) => {
    if (!s[2]) return;
    const d = haversine(lat, lon, s[2], s[3]);
    const cur = best.get(s[0]);
    if (!cur || d < cur.d) best.set(s[0], { d, si });
  });
  return [...best.entries()].map(([gi, v]) => ({ gi, si: v.si, d: v.d }))
    .sort((a, b) => a.d - b.d).slice(0, n);
}

const pinSvg = '<svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 0-7 7c0 5.2 7 13 7 13s7-7.8 7-13a7 7 0 0 0-7-7zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5z"/></svg>';

function showSug(html) { const b = $("#psSuggest"); b.innerHTML = html; b.classList.add("show"); }
function hideSug() { $("#psSuggest").classList.remove("show"); }

function renderSug(list) {
  if (!list.length) {
    showSug('<div class="noresult">見つかりませんでした。別の言い方も試してください</div>');
    return;
  }
  const box = $("#psSuggest");
  box.innerHTML = "";
  list.forEach(r => {
    const name = (r.name || r.display_name.split(",")[0]).trim();
    const kind = (r.display_name.split(",")[1] || "").trim();
    const row = document.createElement("div");
    row.className = "sugrow";
    row.innerHTML = pinSvg + "<span>" + esc(name) + '</span><span class="kind">' + esc(kind) + "</span>";
    row.addEventListener("click", () => chooseFacility(name, +r.lat, +r.lon));
    box.appendChild(row);
  });
  box.classList.add("show");
}

function chooseFacility(name, lat, lon) {
  $("#psInput").value = name;
  hideSug();
  $("#psClear").classList.add("show");
  setRefPoint({ label: name, lat, lon, isMe: false }, "map"); // 施設選択後は地図で位置を見せる
}

// 基準点（施設 or 現在地）を設定して近いバス停を表示する
function setRefPoint(ref, view) {
  refPoint = ref;
  $("#locError").classList.remove("show");
  nearStops = nearestGroups(ref.lat, ref.lon, 5);
  selStop = null;
  $("#selectbar").classList.remove("show");
  $("#sheetNote").innerHTML = ref.isMe
    ? "タップすると" + fieldLabel() + "バス停に設定します"
    : "<b>「" + esc(ref.label) + "」</b>の近くのバス停を表示中";
  $("#viewToggle").classList.add("show");
  renderStopList();
  setLocView(view);
  updateLocMap();
}

function renderStopList() {
  const box = $("#stoplist");
  box.innerHTML = "";
  nearStops.forEach(ns => {
    const name = DATA.g[ns.gi][0];
    const row = document.createElement("div");
    row.className = "stoprow";
    row.innerHTML =
      '<div class="pin">' + pinSvg + "</div>" +
      '<div class="info"><div class="name">' + esc(name) + '</div><div class="plat">のりば' +
        stopsOfGroup[ns.gi].length + "か所</div></div>" +
      '<div class="dist"><div class="m num">' + distLabel(ns.d) + '</div><div class="walk">徒歩' +
        walkMin(ns.d) + "分</div></div>";
    row.addEventListener("click", () => applyLocStop(name));
    box.appendChild(row);
  });
}

function applyLocStop(name) {
  state[targetField] = name;
  $(targetField === "from" ? "#fromInput" : "#toInput").value = name;
  saveState();
  closeLocSheet();
  renderResults();
  const t = $("#locToast");
  t.textContent = fieldLabel() + "バス停を「" + name + "」に設定しました";
  t.classList.add("show");
  clearTimeout(locToastTimer);
  locToastTimer = setTimeout(() => t.classList.remove("show"), 2200);
}

// --- Leaflet 地図 ---
function stopIcon(name, closest, selected) {
  return L.divIcon({ className: "", iconSize: [0, 0], html:
    '<div class="mpin' + (closest ? " closest" : "") + (selected ? " selected" : "") +
    '"><div class="mdot">B</div><div class="mlabel">' + esc(name) + "</div></div>" });
}
function destIcon(name) {
  return L.divIcon({ className: "", iconSize: [0, 0], html:
    '<div class="dpin"><svg width="30" height="40" viewBox="0 0 30 40">' +
    '<path d="M15 40 C9 30 3 24 3 14 a12 12 0 1 1 24 0 c0 10 -6 16 -12 26z" fill="#E0503A" stroke="#fff" stroke-width="2"/>' +
    '<circle cx="15" cy="14" r="4.5" fill="#fff"/></svg>' +
    '<div class="dlabel">' + esc(name) + "</div></div>" });
}
function meIcon() {
  return L.divIcon({ className: "", iconSize: [0, 0], html:
    '<div class="mepin"><div class="pulse"></div><div class="dot"></div></div>' });
}
function ensureLocMap() {
  if (locMap || typeof L === "undefined") return;
  locMap = L.map("locMap", { zoomControl: false });
  L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  }).addTo(locMap);
  $("#zoomIn").addEventListener("click", () => locMap.zoomIn());
  $("#zoomOut").addEventListener("click", () => locMap.zoomOut());
  $("#recenter").addEventListener("click", () => {
    if (refPoint) locMap.setView([refPoint.lat, refPoint.lon], 16);
  });
}
function updateLocMap() {
  ensureLocMap();
  if (!locMap) return;
  stopMarkers.forEach(m => locMap.removeLayer(m));
  stopMarkers = [];
  if (refMarker) { locMap.removeLayer(refMarker); refMarker = null; }
  if (!refPoint) return;
  refMarker = L.marker([refPoint.lat, refPoint.lon],
    { icon: refPoint.isMe ? meIcon() : destIcon(refPoint.label),
      interactive: false, zIndexOffset: 1000 }).addTo(locMap);
  nearStops.forEach((ns, i) => {
    const s = DATA.s[ns.si];
    const mk = L.marker([s[2], s[3]], { icon: stopIcon(DATA.g[ns.gi][0], i === 0, false) }).addTo(locMap);
    mk.on("click", () => selectStopPin(ns));
    stopMarkers.push(mk);
  });
  locMap.setView([refPoint.lat, refPoint.lon], 16);
  setTimeout(() => locMap.invalidateSize(), 0);
}
function selectStopPin(ns) {
  selStop = ns;
  stopMarkers.forEach((mk, i) =>
    mk.setIcon(stopIcon(DATA.g[nearStops[i].gi][0], i === 0, nearStops[i] === ns)));
  $("#selName").textContent = DATA.g[ns.gi][0];
  $("#selDist").textContent = refLabel() + "から" + distLabel(ns.d) +
    "・徒歩" + walkMin(ns.d) + "分（のりば" + stopsOfGroup[ns.gi].length + "か所）";
  $("#selectbar").classList.add("show");
}

function setLocView(v) {
  locView = v;
  document.querySelectorAll("#viewToggle button").forEach(b =>
    b.classList.toggle("active", b.dataset.view === v));
  $("#stoplist").classList.toggle("show", v === "list");
  $("#mapview").classList.toggle("show", v === "map");
  if (v === "map" && locMap) setTimeout(() => locMap.invalidateSize(), 0);
}

function openLocSheet(field) {
  if (!DATA) return;
  targetField = field;
  refPoint = null; nearStops = []; selStop = null;
  // 前回の検索内容は引き継がない（毎回まっさらな状態で開く）
  $("#psInput").value = "";
  $("#psClear").classList.remove("show");
  hideSug();
  $("#viewToggle").classList.remove("show");
  $("#stoplist").classList.remove("show");
  $("#mapview").classList.remove("show");
  $("#selectbar").classList.remove("show");
  $("#locError").classList.remove("show");
  $("#locLoading").classList.remove("show");
  $("#locTitle").textContent = field === "from" ? "現在地から近いバス停" : "目的地の近くのバス停";
  $("#selConfirm").textContent = fieldLabel() + "に設定";
  $("#sheetNote").textContent = "施設名を入力すると、近くのバス停を探します";
  $("#locOverlay").classList.add("show");
  $("#locSheet").classList.add("show");
  if (field === "from") startGeolocate();
  else $("#psInput").focus();
}
function startGeolocate() {
  if (!navigator.geolocation) { $("#locError").classList.add("show"); return; }
  $("#locLoading").classList.add("show");
  navigator.geolocation.getCurrentPosition(
    pos => {
      $("#locLoading").classList.remove("show");
      lastGeo = { label: "現在地", lat: pos.coords.latitude, lon: pos.coords.longitude, isMe: true };
      setRefPoint(lastGeo, "list");  // 現在地はまずリスト表示（モック準拠）
    },
    () => {
      $("#locLoading").classList.remove("show");
      $("#locError").classList.add("show");
    },
    { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 }
  );
}
function closeLocSheet() {
  $("#locOverlay").classList.remove("show");
  $("#locSheet").classList.remove("show");
  hideSug();
}

function bindLocSheet() {
  $("#destBtn").addEventListener("click", () => openLocSheet("to"));
  $("#fromLocBtn").addEventListener("click", () => openLocSheet("from"));
  $("#locOverlay").addEventListener("click", closeLocSheet);
  $("#viewToggle").addEventListener("click", e => {
    const b = e.target.closest("button");
    if (b) setLocView(b.dataset.view);
  });
  $("#selConfirm").addEventListener("click", () => {
    if (selStop) applyLocStop(DATA.g[selStop.gi][0]);
  });
  $("#psClear").addEventListener("click", () => {
    $("#psInput").value = "";
    $("#psClear").classList.remove("show");
    hideSug();
    if (targetField === "from" && lastGeo) {
      setRefPoint(lastGeo, "list");  // 施設検索を消したら現在地基準に戻す
    } else {
      refPoint = null; nearStops = []; selStop = null;
      $("#viewToggle").classList.remove("show");
      $("#selectbar").classList.remove("show");
      $("#stoplist").classList.remove("show");
      $("#mapview").classList.remove("show");
      $("#sheetNote").textContent = "施設名を入力すると、近くのバス停を探します";
    }
    $("#psInput").focus();
  });
  const runSearch = async q => {
    showSug('<div class="noresult">検索中…</div>');
    try {
      renderSug(await searchPlaces(q));
    } catch (e) {
      if (e.name !== "AbortError")
        showSug('<div class="noresult">検索に失敗しました。通信環境を確認してください</div>');
    }
  };
  $("#psInput").addEventListener("input", () => {
    const q = $("#psInput").value.trim();
    $("#psClear").classList.toggle("show", q.length > 0);
    clearTimeout(psTimer);
    if (q.length < 2) { hideSug(); return; }
    psTimer = setTimeout(() => runSearch(q), PS_DEBOUNCE);
  });
  $("#psInput").addEventListener("keydown", e => {
    if (e.key === "Enter") {
      const q = $("#psInput").value.trim();
      if (q.length >= 2) { clearTimeout(psTimer); runSearch(q); }
    }
  });
}

// ===== ヘッダー・警告 =====
function renderHeader() {
  const d = new Date();
  const w = "日月火水木金土"[d.getDay()];
  $("#todayLabel").innerHTML =
    (d.getMonth() + 1) + "/" + d.getDate() + "（" + w + "）" +
    '<span class="dia">' + DIA_NAMES[diaOfToday()] + "ダイヤ</span>";
  // 有効期限
  const ex = DATA.ex;
  const exDate = new Date(+ex.slice(0, 4), +ex.slice(4, 6) - 1, +ex.slice(6, 8));
  $("#expireLabel").textContent =
    "ダイヤ有効期限: " + exDate.getFullYear() + "/" + (exDate.getMonth() + 1) + "/" + exDate.getDate() +
    (DATA.v ? "（" + DATA.v + "）" : "");
  const days = Math.floor((exDate - d) / 86400000);
  if (days < 14) {
    const bar = $("#expireBar");
    bar.style.display = "block";
    bar.textContent = days < 0
      ? "ダイヤの有効期限が切れています。データを更新してください"
      : "ダイヤ改正の可能性があります。データを更新してください（有効期限まで" + days + "日）";
  }
}

// ===== タブ =====
function bindTabs() {
  $("#modeTabs").addEventListener("click", e => {
    const b = e.target.closest("button"); if (!b) return;
    state.mode = b.dataset.mode;
    document.querySelectorAll("#modeTabs button").forEach(x => x.classList.toggle("active", x === b));
    $("#timeInput").disabled = state.mode === "now";
    if (state.mode !== "now" && !state.time) {
      const n = nowMin();
      state.time = String(Math.floor(n / 60)).padStart(2, "0") + ":" + String(n % 60).padStart(2, "0");
      $("#timeInput").value = state.time;
    }
    saveState(); renderResults();
  });
  $("#diaTabs").addEventListener("click", e => {
    const b = e.target.closest("button"); if (!b) return;
    state.dia = +b.dataset.dia;
    document.querySelectorAll("#diaTabs button").forEach(x => x.classList.toggle("active", x === b));
    saveState(); renderResults();
  });
  $("#timeInput").addEventListener("change", () => {
    state.time = $("#timeInput").value; saveState(); renderResults();
  });
  $("#swapBtn").addEventListener("click", () => {
    [state.from, state.to] = [state.to, state.from];
    $("#fromInput").value = state.from;
    $("#toInput").value = state.to;
    saveState(); renderResults();
  });
}
function applyStateToUI() {
  $("#fromInput").value = state.from;
  $("#toInput").value = state.to;
  document.querySelectorAll("#modeTabs button").forEach(x =>
    x.classList.toggle("active", x.dataset.mode === state.mode));
  document.querySelectorAll("#diaTabs button").forEach(x =>
    x.classList.toggle("active", +x.dataset.dia === state.dia));
  $("#timeInput").disabled = state.mode === "now";
  if (state.time) $("#timeInput").value = state.time;
}

function render() {
  renderHeader();
  renderChips();
  renderNext();
  renderResults();
}

// ===== 起動 =====
async function main() {
  try {
    const res = await fetch("data.json");
    DATA = await res.json();
  } catch (e) {
    $("#nextCard").textContent = "data.json の読み込みに失敗しました";
    return;
  }
  buildIndex();
  try { favs = JSON.parse(localStorage.getItem(LS_FAVS)) || []; } catch (e) { favs = []; }
  try {
    const st = JSON.parse(localStorage.getItem(LS_STATE));
    if (st) state = Object.assign(state, st);
  } catch (e) { /* 初期値のまま */ }
  if (!["now", "dep", "arr"].includes(state.mode)) state.mode = "now";
  if (![0, 1, 2].includes(state.dia)) state.dia = diaOfToday();
  // 初回起動時（保存が無いとき）は今日のダイヤを初期値に
  if (localStorage.getItem(LS_STATE) === null) state.dia = diaOfToday();
  state.sel = autoSelectFav();
  if (state.sel < 0) state.sel = 0;

  attachSuggest("#fromInput", "#fromSuggest", "from");
  attachSuggest("#toInput", "#toSuggest", "to");
  bindTabs();
  bindLocSheet();
  applyStateToUI();
  render();

  // 1分ごとに「あと◯分」を自動更新
  timer = setInterval(() => { renderNext(); if (state.mode === "now") renderResults(); }, 60000);
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) render();
  });

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  }
}
main();
</script>
